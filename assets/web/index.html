    function field(label,html){return `<label><span class="field-label">${esc(label)}</span>${html}</label>`}
    function pickerField(label,text,onClick){return `<label><span class="field-label">${esc(label)}</span><button type="button" class="picker-button" onclick="${onClick}">${esc(text||t('notFilled'))}</button></label>`}
    function formHtml(){let a=assetDraft;return `<section class="card"><div class="section-title"><h2>${editingId?t('editAsset'):t('addAssetTitle')}</h2><button class="ghost" onclick="cancelEdit()">${t('collapse')}</button></div><form id="assetForm" onsubmit="submitAsset(event)"><div class="form-grid">${field(t('name'),`<input name="name" required value="${esc(a.name==='未命名资产'?'':a.name)}" oninput="assetDraft.name=this.value">`)}${pickerField(t('category'),categoryLabel(a.category),`openChoice(${jsArg(t('selectCategory'))},categoryOptions(false),'assetDraft.category')`)}${pickerField(t('status'),statusLabel(a.status),`openChoice(${jsArg(t('selectStatus'))},statusOptions(false),'assetDraft.status')`)}${field(t('purchasePrice'),`<input name="purchasePrice" type="number" step="0.01" value="${esc(a.purchasePrice||'')}" oninput="assetDraft.purchasePrice=this.value">`)}${pickerField(t('purchaseDate'),a.purchaseDate,`openDate(${jsArg(t('purchaseDate'))},'assetDraft.purchaseDate')`)}${field(t('currentValue'),`<input name="currentValue" type="number" step="0.01" value="${esc(a.currentValue||'')}" oninput="assetDraft.currentValue=this.value">`)}${pickerField(t('valuationDate'),a.valuationDate||t('notFilled'),`openDate(${jsArg(t('valuationDate'))},'assetDraft.valuationDate')`)}${pickerField(t('warrantyUntil'),a.warrantyUntil||t('notFilled'),`openDate(${jsArg(t('warrantyUntil'))},'assetDraft.warrantyUntil')`)}${pickerField(t('lastUsedDate'),a.lastUsedDate||t('notFilled'),`openDate(${jsArg(t('lastUsedDate'))},'assetDraft.lastUsedDate')`)}${pickerField(t('soldDate'),a.soldDate||t('notFilled'),`openDate(${jsArg(t('soldDate'))},'assetDraft.soldDate')`)}${field(t('salePrice'),`<input name="salePrice" type="number" step="0.01" value="${esc(a.salePrice||'')}" oninput="assetDraft.salePrice=this.value">`)}${field(t('tags'),`<input name="tags" placeholder="${esc(t('tagsPlaceholder'))}" value="${esc(a.tags.join(', '))}" oninput="assetDraft.tags=this.value">`)}${field(t('imageUrl'),`<input name="image" value="${esc(a.image)}" placeholder="${esc(t('imagePlaceholder',{max:MAX_IMAGE_LABEL}))}" oninput="assetDraft.image=this.value">`)}<label class="span2"><span class="field-label">${t('chooseImage')}</span><input id="imageFile" type="file" accept="image/*"></label><label class="span2"><span class="field-label">${t('notes')}</span><textarea name="notes" oninput="assetDraft.notes=this.value">${esc(a.notes)}</textarea></label></div><div class="row" style="margin-top:14px"><button type="submit">${t('saveAsset')}</button><button class="ghost" type="button" onclick="applySuggestedValue()">${t('estimateValue')}</button>${editingId?`<button class="warn" type="button" onclick="askDeleteAsset(${jsArg(editingId)})">${t('delete')}</button>`:''}</div></form></section>`}
    function scrollToForm(){setTimeout(()=>document.getElementById('assetForm')?.scrollIntoView({block:'start',behavior:'auto'}),80)}
    function startAdd(){editingId=null;dialog=null;picker=null;assetDraft=normalizeAsset({name:'',purchasePrice:'',currentValue:''});view='assets';render();scrollToForm()}
    function editAsset(id){editingId=id;dialog=null;picker=null;assetDraft=normalizeAsset(state.assets.find(a=>a.id===id));view='assets';render();scrollToForm()}
    function cancelEdit(){editingId=null;assetDraft=null;picker=null;render()}
    function submitAsset(e){e.preventDefault();let a,nextAssets;try{a=normalizeAsset({...assetDraft,id:editingId||uid()});nextAssets=editingId?state.assets.map(x=>x.id===editingId?a:x):[a,...state.assets];validateStateSize({...state,assets:nextAssets})}catch(err){show(err.message||t('assetInvalid'));return}snapshot(editingId?t('beforeEditAsset'):t('beforeAddAsset'));state.assets=nextAssets;editingId=null;assetDraft=null;view='assets';save(t('assetSaved'));render()}
    function askDeleteAsset(id){openConfirm(t('deleteAsset'),t('deleteAssetConfirm'),t('delete'),()=>{snapshot(t('beforeDeleteAsset'));state.assets=state.assets.filter(a=>a.id!==id);editingId=null;assetDraft=null;dialog=null;view='assets';save(t('assetDeleted'))})}
    function applySuggestedValue(){assetDraft.currentValue=suggestedValue(normalizeAsset(assetDraft));assetDraft.valuationDate=today();render()}
    function detail(id){let a=state.assets.find(x=>x.id===id);if(a){eventDraft={type:'维修',date:today(),amount:'',notes:''};dialog={type:'detail',assetId:id}}render()}
    function detailHtml(){let a=state.assets.find(x=>x.id===dialog.assetId);if(!a)return'';return `<div class="dialog"><div class="section-title"><h2>${esc(a.name)}</h2><button class="ghost" onclick="closeDialog()">${t('close')}</button></div>${a.image?`<img src="${esc(a.image)}" alt="" style="width:100%;max-height:240px;object-fit:cover;border-radius:22px;margin-bottom:12px">`:''}<p><span class="pill">${statusLabel(a.status)}</span><span class="pill">${esc(categoryLabel(a.category))}</span>${a.tags.map(tag=>`<span class="pill">#${esc(tag)}</span>`).join('')}</p><div class="grid stats"><div class="stat"><span>${t('originalPrice')}</span><b>${money(a.purchasePrice)}</b></div><div class="stat"><span>${t('valuation')}</span><b>${money(a.currentValue)}</b></div><div class="stat"><span>${t('maintenanceCost')}</span><b>${money(maintenanceCost(a))}</b></div><div class="stat"><span>${t('realCost')}</span><b>${money(realCost(a))}</b></div></div><p class="muted">${t('purchase')} ${esc(a.purchaseDate)} · ${t('held')} ${daysBetween(a.purchaseDate,a.soldDate||today())} ${t('days')} · ${t('warrantyUntil')} ${esc(a.warrantyUntil||t('notFilled'))}</p><p>${esc(a.notes)}</p><h3>${t('lifecycle')}</h3><div class="timeline"><div class="timeline-item"><b>${t('purchase')}</b> ${esc(a.purchaseDate)} ${money(a.purchasePrice)}</div>${a.events.map(e=>`<div class="timeline-item"><b>${esc(eventTypeLabel(e.type))}</b> ${esc(e.date)} ${e.amount?money(e.amount):''}<br><span class="muted">${esc(e.notes)}</span> <button class="link" onclick="askRemoveEvent(${jsArg(a.id)},${jsArg(e.id)})">${t('delete')}</button></div>`).join('')}</div><h3>${t('addEvent')}</h3><form onsubmit="addEvent(event,${jsArg(a.id)})" class="form-grid">${pickerField(t('type'),eventTypeLabel(eventDraft.type),`openChoice(${jsArg(t('selectEventType'))},eventOptions(),'eventDraft.type')`)}${pickerField(t('date'),eventDraft.date,`openDate(${jsArg(t('eventDate'))},'eventDraft.date')`)}${field(t('amount'),`<input name="amount" type="number" step="0.01" value="${esc(eventDraft.amount)}" oninput="eventDraft.amount=this.value">`)}${field(t('notes'),`<input name="notes" value="${esc(eventDraft.notes)}" oninput="eventDraft.notes=this.value">`)}<div class="span2 row"><button>${t('addEventButton')}</button><button class="ghost" type="button" onclick="editAsset(${jsArg(a.id)})">${t('editAsset')}</button></div></form></div>`}
    function addEvent(e,id){e.preventDefault();let a=state.assets.find(x=>x.id===id),type=eventDraft.type,date=eventDraft.date||today(),amount=num(eventDraft.amount),notes=eventDraft.notes;snapshot(t('beforeAddEvent'));a.events.push({id:uid(),type,date,amount,notes});if(type==='估值'){a.currentValue=amount;a.valuationDate=date}if(type==='使用'){a.lastUsedDate=date}if(type==='出售'){a.status='sold';a.soldDate=date;a.salePrice=amount;a.currentValue=0}if(type==='报废'){a.status='retired';a.currentValue=0}save(t('eventAdded'));detail(id)}
    function askRemoveEvent(assetId,eventId){openConfirm(t('deleteEvent'),t('deleteEventConfirm'),t('delete'),()=>{let a=state.assets.find(x=>x.id===assetId);snapshot(t('beforeDeleteEvent'));a.events=a.events.filter(e=>e.id!==eventId);save(t('eventDeleted'));detail(assetId)})}
    function settingsHtml(){return `<section><div class="section-title"><h2>${t('settings')}</h2><button class="ghost" onclick="toggleLanguage()">${t('languageButton')}</button></div><div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr))"><div class="card"><h3>${t('dataBackup')}</h3><p class="muted">${t('backupHint')}</p><div class="row"><button class="ghost" onclick="openDialog('exportJson')">${t('exportJson')}</button><button class="ghost" onclick="openDialog('importJson')">${t('importJson')}</button><button class="ghost" onclick="openDialog('exportCsv')">${t('exportCsv')}</button><button class="ghost" onclick="openDialog('importCsv')">${t('importCsv')}</button><button onclick="manualBackup()">${t('manualBackup')}</button></div>${backupHtml()}</div><div class="card"><h3>${t('categoryManagement')}</h3>${categoriesHtml()}</div><div class="card"><h3>${t('preferences')}</h3><div class="setting-block">${pickerField(t('theme'),themeLabel(state.settings.theme),`openChoice(${jsArg(t('selectTheme'))},themeOptions(),'state.settings.theme',${jsArg(t('themeUpdated'))})`)}</div><label><span class="field-label">${t('depreciationRate')}</span><input type="number" value="${esc(state.settings.depreciationRate)}" onchange="state.settings.depreciationRate=num(this.value);save(${jsArg(t('depreciationUpdated'))})"></label></div><div class="card"><h3>${t('dangerZone')}</h3><p class="muted">${t('clearHint')}</p><button class="warn" onclick="askClearAll()">${t('clearAll')}</button></div></div></section>`}
    function categoriesHtml(){return `<div class="row" style="margin-bottom:10px"><button onclick="askAddCategory()">${t('addCategory')}</button></div><table class="table"><tbody>${state.categories.map((c,i)=>`<tr><td><button class="choice-item" style="padding:10px;justify-content:center" onclick="openColorPicker(${i})"><span class="category-dot" style="background:${esc(c.color)}"></span></button></td><td><input value="${esc(c.name)}" onchange="renameCategory(${i},this.value)"></td><td><button class="ghost" onclick="openColorPicker(${i})">${t('color')}</button></td><td><button class="ghost" onclick="askRemoveCategory(${i})">${t('delete')}</button></td></tr>`).join('')}</tbody></table>`}
    function askAddCategory(){openText(t('addCategory'),t('categoryName'),'',name=>{if(!name.trim())return;state.categories.push({name:name.trim(),color:'#718096'});save(t('categoryAdded'))})}
    function renameCategory(i,name){let old=state.categories[i].name;state.categories[i].name=name;state.assets.forEach(a=>{if(a.category===old)a.category=name});save(t('categoryRenamed'))}
    function askRemoveCategory(i){let name=state.categories[i].name;if(state.categories.length<=1)return show(t('keepOneCategory'));openConfirm(t('deleteCategory'),t('deleteCategoryConfirm',{name}),t('delete'),()=>{state.categories.splice(i,1);if(!state.categories.find(c=>c.name==='其他'))state.categories.push({name:'其他',color:'#718096'});state.assets.forEach(a=>{if(a.category===name)a.category='其他'});save(t('categoryDeleted'))})}
    function colorOptions(){return [['#4299e1',t('color.blue')],['#ed8936',t('color.orange')],['#9f7aea',t('color.purple')],['#48bb78',t('color.green')],['#ecc94b',t('color.yellow')],['#f56565',t('color.red')],['#718096',t('color.gray')],['#b7791f',t('color.brown')],['#2d3748',t('color.darkGray')],['#38b2ac',t('color.teal')]]}
    function openColorPicker(i){let c=state.categories[i];picker={type:'color',title:t('selectCategoryColor',{name:categoryLabel(c.name)}),categoryIndex:i,options:colorOptions()};render()}
    function chooseColor(value){state.categories[picker.categoryIndex].color=value;picker=null;save(t('categoryColorUpdated'));render()}
    function backupHtml(){let list=getBackups();return list.length?`<div style="margin-top:14px"><table class="table"><thead><tr><th>${t('backupTime')}</th><th>${t('backupLabel')}</th><th></th></tr></thead><tbody>${list.map(b=>`<tr><td>${esc(formatDateTime(b.at))}</td><td>${esc(b.label||t('notFilled'))}</td><td><div class="row"><button class="ghost" onclick="askEditBackupLabel(${jsArg(b.id)})">${t('editBackupLabel')}</button><button class="ghost" onclick="askRestoreBackup(${jsArg(b.id)})">${t('restore')}</button><button class="ghost" onclick="askDeleteBackup(${jsArg(b.id)})">${t('delete')}</button></div></td></tr>`).join('')}</tbody></table></div>`:`<div class="empty">${t('noBackups')}</div>`}
    function manualBackup(){openText(t('createBackup'),t('backupLabelField'),t('manualBackupLabel'),label=>{snapshot(label.trim()||t('manualBackupLabel'));show(t('backupCreated'));render()})}
    function askEditBackupLabel(id){let b=getBackups().find(x=>x.id===id);if(!b)return;openText(t('editBackupLabelTitle'),t('backupLabelField'),b.label||'',label=>{let list=getBackups();let item=list.find(x=>x.id===id);if(!item)return;item.label=label.trim()||t('notFilled');saveBackups(list);show(t('backupLabelUpdated'));render()})}
    function askRestoreBackup(id){let b=getBackups().find(x=>x.id===id);if(!b)return;openConfirm(t('restoreBackup'),t('restoreBackupConfirm'),t('restore'),()=>{snapshot(t('beforeRestoreBackup'));state=normalizeState(JSON.parse(b.data));save(t('backupRestored'));render()})}
    function askDeleteBackup(id){openConfirm(t('deleteBackup'),t('deleteBackupConfirm'),t('delete'),()=>{let list=getBackups().filter(b=>b.id!==id);saveBackups(list);show(t('backupDeleted'));render()})}
    function askClearAll(){openConfirm(t('clearAll'),t('clearAllConfirm'),t('clear'),()=>{snapshot(t('beforeClearAll'));state.assets=[];editingId=null;assetDraft=null;dialog=null;view='dashboard';save(t('assetsCleared'));render()})}
    function categoryOptions(withAll){let arr=state.categories.map(c=>[c.name,categoryLabel(c.name),c.color]);return withAll?[['all',t('allCategories')],...arr]:arr}
    function statusOptions(withAll){let arr=Object.keys(STATUS).map(k=>[k,statusLabel(k)]);return withAll?[['all',t('allStatuses')],...arr]:arr}
    function eventOptions(){return EVENT_TYPES.map(type=>[type,eventTypeLabel(type)])}
    function themeOptions(){return [['warm',t('warmTheme')],['dark',t('darkTheme')],['plain',t('plainTheme')]]}
    function themeLabel(v){return (themeOptions().find(x=>x[0]===v)||themeOptions()[0])[1]}
    function openChoice(title,options,path,saveMsg){picker={type:'choice',title,options,path,saveMsg};render()}
    function openDate(title,path){let value=getPath(path)||today(),parts=String(value||today()).split('-');picker={type:'date',title,path,year:parts[0]||today().slice(0,4),month:parts[1]||today().slice(5,7),day:parts[2]||today().slice(8,10)};render()}
    function openConfirm(title,message,confirmText,action){picker={type:'confirm',title,message,confirmText,action};render()}
    function openText(title,label,value,action){picker={type:'text',title,label,value,action};render()}
    function pathTarget(path){let parts=path.split('.'),root=parts.shift(),roots={state,query,assetDraft,eventDraft,picker},obj=roots[root]||window[root];return {obj,parts}}
    function getPath(path){let target=pathTarget(path);return target.parts.reduce((o,k)=>o&&o[k],target.obj)}
    function setPath(path,value){let target=pathTarget(path),obj=target.obj;if(!obj)return;for(let i=0;i<target.parts.length-1;i++)obj=obj[target.parts[i]];obj[target.parts.at(-1)]=value}
    function chooseValue(value){setPath(picker.path,value);let msg=picker.saveMsg;if(picker.path.startsWith('state.'))save(msg||t('settingsUpdated'));picker=null;render()}
    function chooseDate(){let y=String(document.getElementById('pickYear').value).padStart(4,'0'),m=String(document.getElementById('pickMonth').value).padStart(2,'0'),d=String(document.getElementById('pickDay').value).padStart(2,'0'),date=`${y}-${m}-${d}`,check=new Date(date);if(!/^\d{4}-\d{2}-\d{2}$/.test(date)||check.getFullYear()!=Number(y)||check.getMonth()+1!=Number(m)||check.getDate()!=Number(d)){show(t('invalidDate'));return}setPath(picker.path,date);picker=null;render()}
    function clearDate(){setPath(picker.path,'');picker=null;render()}
    function confirmPicker(){let action=picker.action;picker=null;action();render()}
    function confirmText(){let value=document.getElementById('pickerText').value,action=picker.action;picker=null;action(value);render()}
    function pickerHtml(){if(!picker)return'';if(picker.type==='choice'){let current=getPath(picker.path);return `<div class="picker-backdrop"><div class="picker"><div class="section-title"><h2>${esc(picker.title)}</h2><button class="ghost" onclick="picker=null;render()">${t('close')}</button></div><div class="choice-list">${picker.options.map(o=>`<button class="choice-item ${current===o[0]?'active':''}" onclick="chooseValue(${jsArg(o[0])})"><span>${o[2]?`<span class="category-dot" style="background:${esc(o[2])}"></span> `:''}${esc(o[1])}</span><span>${current===o[0]?'✓':''}</span></button>`).join('')}</div></div></div>`}if(picker.type==='color'){let current=state.categories[picker.categoryIndex].color;return `<div class="picker-backdrop"><div class="picker"><div class="section-title"><h2>${esc(picker.title)}</h2><button class="ghost" onclick="picker=null;render()">${t('close')}</button></div><div class="choice-list">${picker.options.map(o=>`<button class="choice-item ${current===o[0]?'active':''}" onclick="chooseColor(${jsArg(o[0])})"><span><span class="category-dot" style="background:${esc(o[0])}"></span> ${esc(o[1])}</span><span>${current===o[0]?'✓':''}</span></button>`).join('')}</div></div></div>`}if(picker.type==='date'){return `<div class="picker-backdrop"><div class="picker"><div class="section-title"><h2>${esc(picker.title)}</h2><button class="ghost" onclick="picker=null;render()">${t('close')}</button></div><div class="date-grid"><label><span class="field-label">${t('year')}</span><input id="pickYear" inputmode="numeric" value="${esc(picker.year)}"></label><label><span class="field-label">${t('month')}</span><input id="pickMonth" inputmode="numeric" value="${esc(picker.month)}"></label><label><span class="field-label">${t('day')}</span><input id="pickDay" inputmode="numeric" value="${esc(picker.day)}"></label></div><div class="row" style="margin-top:14px"><button onclick="chooseDate()">${t('confirm')}</button><button class="ghost" onclick="picker.year=today().slice(0,4);picker.month=today().slice(5,7);picker.day=today().slice(8,10);render()">${t('today')}</button><button class="ghost" onclick="clearDate()">${t('clear')}</button></div></div></div>`}if(picker.type==='confirm'){return `<div class="picker-backdrop"><div class="picker"><h2>${esc(picker.title)}</h2><p class="muted">${esc(picker.message)}</p><div class="row"><button class="warn" onclick="confirmPicker()">${esc(picker.confirmText)}</button><button class="ghost" onclick="picker=null;render()">${t('cancel')}</button></div></div></div>`}return `<div class="picker-backdrop"><div class="picker"><h2>${esc(picker.title)}</h2><label><span class="field-label">${esc(picker.label)}</span><input id="pickerText" value="${esc(picker.value)}"></label><div class="row" style="margin-top:14px"><button onclick="confirmText()">${t('confirm')}</button><button class="ghost" onclick="picker=null;render()">${t('cancel')}</button></div></div></div>`}
    function openDialog(type){dialog={type,text:type==='exportJson'?exportData():type==='exportCsv'?exportCsv():'',preview:null,error:''};render()}
    function closeDialog(){dialog=null;render()}
    function getDialogText(){return document.getElementById('dialogText')?.value||''}
    function importFeedbackHtml(){return `${dialog?.error?`<p class="danger-text">${esc(dialog.error)}</p>`:''}${dialog?.preview?`<div class="card"><b>${t('preview',{assets:dialog.preview.assets.length,categories:dialog.preview.categories.length})}</b><p class="muted">${t('importReplace',{count:state.assets.length})}</p></div>`:''}<div class="row"><button onclick="previewImport('${dialog?.type||'importJson'}')">${t('previewImport')}</button>${dialog?.preview?`<button class="ok" onclick="confirmImport()">${t('confirmImport')}</button>`:''}</div>`}
    function updateImportDialogFeedback(){let box=document.getElementById('importFeedback');if(box)box.innerHTML=importFeedbackHtml()}
    function dialogHtml(){if(!dialog)return'';if(dialog.type==='detail')return `<div class="dialog-backdrop">${detailHtml()}</div>`;let title={exportJson:t('exportJson'),importJson:t('importJson'),exportCsv:t('exportCsv'),importCsv:t('importCsv')}[dialog.type],isExport=dialog.type.startsWith('export');return `<div class="dialog-backdrop"><div class="dialog"><div class="section-title"><h2>${title}</h2><button class="ghost" onclick="closeDialog()">${t('close')}</button></div>${isExport?`<p class="muted">${t('exportHelp')}</p><textarea readonly id="dialogText">${esc(dialog.text)}</textarea><div class="row"><button onclick="copyText(document.getElementById('dialogText').value)">${t('copy')}</button></div>`:`<p class="muted">${t('importHelp',{type:dialog.type==='importCsv'?'CSV':'JSON'})}</p><textarea id="dialogText" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea><div id="importFeedback">${importFeedbackHtml()}</div>`}</div></div>`}
    function previewImport(type){let text=getDialogText();try{dialog.preview=type==='importCsv'?parseCsv(text):parseImport(text);dialog.error=''}catch(e){dialog.error=e.message||t('importFailed');dialog.preview=null}updateImportDialogFeedback()}
    function confirmImport(){if(!dialog.preview)return;snapshot(t('beforeImport'));state=dialog.preview;editingId=null;assetDraft=null;dialog=null;view='assets';save(t('imported'));render()}
    function bindFormImage(){let input=document.getElementById('imageFile');if(!input)return;input.onchange=e=>{let file=e.target.files[0];if(!file)return;if(file.size>MAX_IMAGE_BYTES){show(t('imageTooLargeHint',{max:MAX_IMAGE_LABEL}));input.value='';return}let reader=new FileReader();reader.onload=()=>{try{assetDraft.image=cleanImage(reader.result);render()}catch(err){show(err.message||t('imageInvalid'));input.value=''}};reader.readAsDataURL(file)}}
    Object.assign(window,{startAdd,setView,detail,editAsset,cancelEdit,submitAsset,askDeleteAsset,applySuggestedValue,addEvent,askRemoveEvent,askAddCategory,renameCategory,askRemoveCategory,openColorPicker,chooseColor,manualBackup,askEditBackupLabel,askRestoreBackup,askDeleteBackup,askClearAll,openDialog,closeDialog,previewImport,confirmImport,copyText,num,openChoice,openDate,chooseValue,chooseDate,clearDate,confirmPicker,confirmText,onSearchInput,toggleLanguage});
    render();
