<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Money-个人资产管理</title>
  <style>
    :root{--bg:#f5ead8;--panel:#fff8eb;--panel2:#fffdf6;--ink:#24190f;--muted:#7b6247;--line:#ecd7b7;--brand:#b7791f;--brand2:#f3c969;--danger:#b83232;--ok:#2f855a;--shadow:0 22px 70px rgba(82,48,13,.14);--navh:76px;--vvh:100dvh}
    [data-theme="dark"]{--bg:#120f0b;--panel:#1f1811;--panel2:#2a2016;--ink:#fff7e8;--muted:#d8bc93;--line:#493621;--brand:#f6ad55;--brand2:#ffd98a;--shadow:0 24px 70px rgba(0,0,0,.45)}
    [data-theme="plain"]{--bg:#f6f7f9;--panel:#fff;--panel2:#fff;--ink:#18202a;--muted:#607086;--line:#dbe2ea;--brand:#2563eb;--brand2:#93c5fd;--shadow:0 18px 45px rgba(30,41,59,.12)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html{min-height:100%;background:var(--bg)}body{min-height:100%;margin:0;background:radial-gradient(circle at 8% 0%,rgba(247,198,91,.28),transparent 32%),var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;overscroll-behavior:none}button,input,textarea{font:inherit}button{border:0;border-radius:16px;padding:11px 15px;background:var(--ink);color:var(--panel2);font-weight:750;cursor:pointer}button.ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}button.warn{background:var(--danger);color:white}button.ok{background:var(--ok);color:white}button.link{background:transparent;color:var(--brand);padding:4px 0}input,textarea{width:100%;border:1px solid var(--line);border-radius:16px;padding:12px 13px;background:var(--panel2);color:var(--ink)}textarea{min-height:92px;resize:vertical}.app{max-width:1180px;margin:auto;padding:22px 16px calc(var(--navh) + 38px + env(safe-area-inset-bottom))}.keyboard-open .app{padding-bottom:28px}.hero{background:linear-gradient(135deg,var(--ink),#5b3612);color:#fff6df;border-radius:32px;padding:24px;box-shadow:var(--shadow);position:relative;overflow:hidden}.hero:after{content:"";position:absolute;right:-80px;top:-80px;width:210px;height:210px;border-radius:50%;background:rgba(255,217,138,.24);pointer-events:none}.hero>*{position:relative;z-index:1}.hero h1{font-size:30px;margin:0 0 8px;letter-spacing:-.06em}.hero p{margin:0;color:#ffe8bd;line-height:1.6}.top-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.grid{display:grid;gap:14px}.stats{grid-template-columns:repeat(4,minmax(0,1fr));margin:16px 0}.card{background:rgba(255,248,235,.9);border:1px solid var(--line);border-radius:26px;padding:18px;box-shadow:var(--shadow)}[data-theme="dark"] .card{background:rgba(31,24,17,.92)}.stat b{display:block;font-size:24px;margin-top:7px}.stat span,.muted{color:var(--muted);font-size:13px}.tabs{position:fixed;left:16px;right:16px;bottom:calc(10px + env(safe-area-inset-bottom));z-index:20;max-width:760px;margin:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:7px;background:rgba(255,248,235,.82);border:1px solid var(--line);border-radius:24px;padding:8px;box-shadow:var(--shadow);backdrop-filter:none}.keyboard-open .tabs{display:none}[data-theme="dark"] .tabs{background:rgba(31,24,17,.86)}.tabs button{padding:12px 6px;border-radius:17px;background:transparent;color:var(--muted)}.tabs button.active{background:var(--ink);color:var(--panel2)}.toolbar{display:grid;grid-template-columns:2fr repeat(3,1fr);gap:10px;margin:16px 0}.asset-list{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}.asset{display:flex;gap:13px}.thumb{width:66px;height:66px;border-radius:20px;background:linear-gradient(135deg,var(--brand2),var(--brand));display:grid;place-items:center;color:#fff;font-size:28px;font-weight:900;flex:0 0 auto;overflow:hidden}.asset h3{margin:0 0 6px}.pill{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line);border-radius:999px;padding:5px 9px;margin:3px 4px 3px 0;background:var(--panel2);color:var(--muted);font-size:12px}.bar{height:10px;background:var(--line);border-radius:999px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2))}.section-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:18px 0 12px}.form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.span2{grid-column:1/-1}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.table{width:100%;border-collapse:collapse}.table th,.table td{text-align:left;border-bottom:1px solid var(--line);padding:10px 8px}.field-label{display:block;color:var(--muted);font-size:13px;margin-bottom:6px}.picker-button{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;border:1px solid var(--line);border-radius:16px;padding:12px 13px;background:var(--panel2);color:var(--ink);font-weight:650}.picker-button:after{content:"⌄";color:var(--muted)}.setting-block{margin:14px 0}.dialog-backdrop,.picker-backdrop{position:fixed;inset:0;background:rgba(18,12,5,.54);display:grid;place-items:center;padding:16px;z-index:30;overflow:auto}.keyboard-open .dialog-backdrop,.keyboard-open .picker-backdrop{place-items:start center;padding-bottom:24px}.picker-backdrop{z-index:45}.dialog,.picker{width:min(760px,100%);max-height:min(88vh,calc(var(--vvh) - 32px));overflow:auto;-webkit-overflow-scrolling:touch;background:var(--panel);border:1px solid var(--line);border-radius:28px;padding:20px;box-shadow:0 30px 90px rgba(0,0,0,.35)}.picker{width:min(480px,100%)}.dialog textarea{min-height:260px;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:13px}.choice-list{display:grid;gap:10px}.choice-item{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;border:1px solid var(--line);border-radius:18px;background:var(--panel2);color:var(--ink);padding:13px 14px}.choice-item.active{outline:2px solid var(--brand);background:linear-gradient(135deg,var(--panel2),rgba(247,198,91,.18))}.date-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.toast{position:fixed;left:16px;right:16px;bottom:calc(var(--navh) + 18px + env(safe-area-inset-bottom));background:var(--ink);color:var(--panel2);padding:14px 16px;border-radius:18px;box-shadow:var(--shadow);z-index:50}.keyboard-open .toast{bottom:calc(12px + env(safe-area-inset-bottom))}.danger-text{color:var(--danger)}.empty{text-align:center;padding:34px;color:var(--muted)}.category-dot{width:13px;height:13px;border-radius:50%;display:inline-block}.timeline{border-left:2px solid var(--line);padding-left:14px}.timeline-item{margin:0 0 12px;position:relative}.timeline-item:before{content:"";position:absolute;left:-21px;top:5px;width:10px;height:10px;border-radius:50%;background:var(--brand)}.rank-scroll{max-height:360px;overflow:auto;padding-right:4px}.donut-card{grid-column:1/-1}.donut-layout{display:grid;grid-template-columns:180px 1fr;gap:18px;align-items:center}.donut{width:170px;height:170px;border-radius:50%;display:grid;place-items:center;position:relative;box-shadow:inset 0 0 0 1px var(--line)}.donut:after{content:"";position:absolute;inset:34px;border-radius:50%;background:var(--panel)}.donut div{position:relative;z-index:1;text-align:center;font-weight:800}.donut span{display:block;color:var(--muted);font-size:12px;font-weight:600}.rank-list{display:grid;gap:10px}.rank-item{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center}.rank-item b{font-size:14px}@media(max-width:820px){.stats{grid-template-columns:repeat(2,1fr)}.toolbar{grid-template-columns:1fr 1fr}.toolbar input{grid-column:1/-1}.form-grid{grid-template-columns:1fr}.hero h1{font-size:26px}}@media(max-width:520px){.stats{grid-template-columns:1fr}.asset-list{grid-template-columns:1fr}.card{border-radius:22px}.hero{border-radius:26px}.top-actions button{flex:1}.toolbar{grid-template-columns:1fr 1fr}.date-grid{grid-template-columns:1fr}.donut-layout{grid-template-columns:1fr}.donut{margin:auto}.dialog-backdrop{place-items:start center}.dialog{max-height:calc(var(--vvh) - 32px)}}
  </style>
</head>
<body>
  <div id="app"><main class="app"><section class="hero"><h1>Money 个人资产管理</h1><p>正在打开本机资产数据...</p></section></main></div>
  <script>
    const STORE='grzcgl.assets.v2',OLD='grzcgl.assets.v1',BACKUPS='grzcgl.assets.backups.v2';
    const MAX_IMPORT_CHARS=20000000,MAX_ASSETS=1000,MAX_CATEGORIES=80,MAX_EVENTS_PER_ASSET=200,MAX_TEXT_CHARS=1000,MAX_NOTES_CHARS=5000,MAX_TAGS=30,MAX_IMAGE_BYTES=10*1024*1024,MAX_IMAGE_LABEL='10MB',MAX_STATE_CHARS=20000000,MAX_BACKUPS=3,MAX_BACKUP_TOTAL_CHARS=20000000;
    const STATUS={active:'使用中',idle:'闲置',sold:'已出售',retired:'已报废'};
    const EVENT_TYPES=['购买','维修','保养','估值','使用','出售','报废','备注'];
    const DEFAULT_CATEGORIES=[{name:'数码',color:'#4299e1'},{name:'家电',color:'#ed8936'},{name:'家具',color:'#9f7aea'},{name:'交通',color:'#48bb78'},{name:'收藏',color:'#ecc94b'},{name:'证件',color:'#f56565'},{name:'其他',color:'#718096'}];
    const DEFAULT_SETTINGS={theme:'warm',depreciationRate:18};
    let state=loadState();
    let view='dashboard',editingId=null,assetDraft=null,eventDraft=null,dialog=null,picker=null,toast='',query={text:'',category:'all',status:'all',price:'all',date:'all',reminder:'all'};
    function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
    function today(){return new Date().toISOString().slice(0,10)}
    function money(n){return '¥'+Number(n||0).toLocaleString('zh-CN',{maximumFractionDigits:0})}
    function num(n){return Number.isFinite(Number(n))?Number(n):0}
    function esc(v){return String(v??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
    function jsArg(v){return JSON.stringify(v).replace(/"/g,'&quot;')}
    function daysBetween(a,b=today()){if(!a)return 0;let start=new Date(a),end=new Date(b);if(Number.isNaN(start.getTime())||Number.isNaN(end.getTime()))return 0;return Math.max(0,Math.ceil((end-start)/86400000))}
    function toTags(v){return Array.isArray(v)?v.filter(Boolean):String(v||'').split(/[，,\s]+/).map(s=>s.trim()).filter(Boolean)}
    function limitText(value,max=MAX_TEXT_CHARS){return String(value??'').slice(0,max)}
    function limitArray(list,max){return (Array.isArray(list)?list:[]).slice(0,max)}
    function imageBytes(value){let s=String(value||'');if(!s)return 0;let m=s.match(/^data:image\/[a-z0-9.+-]+;base64,(.*)$/i);return m?Math.ceil(m[1].length*3/4):s.length}
    function cleanImage(value){let s=String(value||'').trim();if(!s)return'';if(imageBytes(s)>MAX_IMAGE_BYTES)throw Error(`图片过大，请选择小于 ${MAX_IMAGE_LABEL} 的图片。`);if(/^data:image\/(png|jpe?g|webp|gif);base64,[a-z0-9+/=\s]+$/i.test(s))return s;if(/^https:\/\/[^\s<>"']{1,900}$/i.test(s))return s;throw Error('图片格式不安全，请使用 HTTPS 图片地址或图片 Base64。')}
    function serializedSize(value){return JSON.stringify(value).length}
    function validateStateSize(value){if(serializedSize(value)>MAX_STATE_CHARS)throw Error('数据过大，请减少图片或资产数量后再保存。')}
    function normalizeAsset(a={}){let events=limitArray(a.events,MAX_EVENTS_PER_ASSET),purchasePrice=num(a.purchasePrice),currentValue=a.currentValue===''||a.currentValue==null?purchasePrice:num(a.currentValue);return {id:limitText(a.id||uid(),MAX_TEXT_CHARS),name:limitText(a.name||'未命名资产'),purchasePrice,purchaseDate:limitText(a.purchaseDate||today(),40),category:limitText(a.category||'其他'),status:STATUS[a.status]?a.status:(['使用中','闲置','已出售'].includes(a.status)?Object.keys(STATUS).find(k=>STATUS[k]===a.status):'active'),currentValue,valuationDate:limitText(a.valuationDate||'',40),warrantyUntil:limitText(a.warrantyUntil||'',40),lastUsedDate:limitText(a.lastUsedDate||'',40),tags:toTags(a.tags).slice(0,MAX_TAGS).map(t=>limitText(t,80)),image:cleanImage(a.image),soldDate:limitText(a.soldDate||'',40),salePrice:a.salePrice===''?0:num(a.salePrice),notes:limitText(a.notes||'',MAX_NOTES_CHARS),events:events.map(e=>({id:limitText(e.id||uid(),MAX_TEXT_CHARS),type:limitText(e.type||'备注',80),date:limitText(e.date||today(),40),amount:num(e.amount),notes:limitText(e.notes||'',MAX_NOTES_CHARS)}))}}
    function loadState(){try{let raw=localStorage.getItem(STORE);if(raw){if(raw.length>MAX_STATE_CHARS)throw Error('stored state too large');return normalizeState(JSON.parse(raw),false)}let old=localStorage.getItem(OLD);if(old){if(old.length>MAX_STATE_CHARS)throw Error('old state too large');let assets=JSON.parse(old);return normalizeState({version:2,assets:Array.isArray(assets)?assets:[],categories:DEFAULT_CATEGORIES,settings:DEFAULT_SETTINGS},false)}}catch(e){}return normalizeState({version:2,assets:[],categories:DEFAULT_CATEGORIES,settings:DEFAULT_SETTINGS})}
    function normalizeState(s,validateSize=true){let cats=Array.isArray(s.categories)&&s.categories.length?s.categories:DEFAULT_CATEGORIES;let next={version:2,assets:limitArray(s.assets,MAX_ASSETS).map(normalizeAsset),categories:limitArray(cats,MAX_CATEGORIES).map(c=>({name:limitText(c.name||'其他'),color:/^#[0-9a-f]{6}$/i.test(c.color)?c.color:'#718096'})),settings:{...DEFAULT_SETTINGS,...(s.settings||{})}};if(validateSize)validateStateSize(next);return next}
    function save(reason='保存成功'){try{let data=JSON.stringify(state);if(data.length>MAX_STATE_CHARS){show('保存失败：数据过大，请导出备份并减少图片体积。');return}localStorage.setItem(STORE,data);show(reason)}catch(e){show('保存失败：本机存储空间不足，请导出备份并减少图片体积。')}}
    function snapshot(label){try{let data=JSON.stringify(state);if(data.length>MAX_STATE_CHARS)return;let list=getBackups();list.unshift({id:uid(),at:new Date().toISOString(),label:limitText(label||'手动备份'),data});saveBackups(list)}catch(e){}}
    function getBackups(){try{let list=JSON.parse(localStorage.getItem(BACKUPS)||'[]');return Array.isArray(list)?list:[]}catch{return[]}}
    function saveBackups(list){let out=[],size=0;for(let b of limitArray(list,MAX_BACKUPS)){let item={id:limitText(b.id||uid()),at:limitText(b.at||new Date().toISOString(),80),label:limitText(b.label||'未填写'),data:String(b.data||'')};let next=size+JSON.stringify(item).length;if(next>MAX_BACKUP_TOTAL_CHARS)continue;out.push(item);size=next}localStorage.setItem(BACKUPS,JSON.stringify(out))}
    function toastHtml(){return toast?`<div id="toast" class="toast">${esc(toast)}</div>`:'<div id="toast"></div>'}
    function updateToast(){let box=document.getElementById('toast');if(box)box.outerHTML=toastHtml();else render()}
    function show(msg){toast=msg;updateToast();clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>{toast='';updateToast()},2200)}
    function categoryColor(name){return (state.categories.find(c=>c.name===name)||{}).color||'#718096'}
    function maintenanceCost(a){return (a.events||[]).filter(e=>['维修','保养'].includes(e.type)).reduce((s,e)=>s+num(e.amount),0)}
    function realCost(a){return num(a.purchasePrice)+maintenanceCost(a)-num(a.salePrice)}
    function categoryAmountStats(){let map=new Map();state.assets.forEach(a=>{let name=a.category||'其他',amount=Math.max(0,realCost(a));if(!amount)return;let item=map.get(name)||{name,total:0,color:categoryColor(name)};item.total+=amount;map.set(name,item)});return [...map.values()].sort((a,b)=>b.total-a.total)}
    function donutGradient(items){let total=items.reduce((s,x)=>s+x.total,0),start=0;if(!total)return'conic-gradient(var(--line) 0 100%)';return `conic-gradient(${items.map(x=>{let end=start+x.total/total*100,part=`${x.color} ${start.toFixed(2)}% ${end.toFixed(2)}%`;start=end;return part}).join(',')})`}
    function categoryDonutHtml(){let items=categoryAmountStats(),total=items.reduce((s,x)=>s+x.total,0);return `<div class="card donut-card"><div class="section-title"><h2>分类金额分布</h2><span class="muted">按真实成本统计</span></div>${items.length?`<div class="donut-layout"><div class="donut" style="background:${donutGradient(items)}"><div><span>总计</span>${money(total)}</div></div><div class="rank-list">${items.map((x,i)=>`<div class="rank-item"><span class="category-dot" style="background:${esc(x.color)}"></span><b>${i+1}. ${esc(x.name)}</b><span>${money(x.total)}</span></div>`).join('')}</div></div>`:'<div class="empty">添加资产后显示分类金额分布</div>'}</div>`}
    function currentWorth(a){return a.status==='sold'||a.status==='retired'?0:num(a.currentValue)}
    function depreciation(a){return Math.max(0,num(a.purchasePrice)-currentWorth(a))}
    function suggestedValue(a){let age=daysBetween(a.purchaseDate)/365,rate=num(state.settings.depreciationRate)/100;return Math.max(0,Math.round(num(a.purchasePrice)*Math.pow(1-rate,age)))}
    function filteredAssets(){return state.assets.filter(a=>{let t=query.text.trim().toLowerCase();let hit=!t||[a.name,a.category,a.notes,...a.tags].join(' ').toLowerCase().includes(t);let p=num(a.purchasePrice);let price=query.price==='all'||(query.price==='0-1000'&&p<1000)||(query.price==='1000-5000'&&p>=1000&&p<5000)||(query.price==='5000+'&&p>=5000);let age=daysBetween(a.purchaseDate);let date=query.date==='all'||(query.date==='year'&&age<=365)||(query.date==='old'&&age>365);let rem=query.reminder==='all'||(query.reminder==='warranty'&&a.warrantyUntil&&daysBetween(today(),a.warrantyUntil)<=60&&new Date(a.warrantyUntil)>=new Date(today()))||(query.reminder==='idle'&&a.status!=='sold'&&daysBetween(a.lastUsedDate||a.purchaseDate)>180);return hit&&(query.category==='all'||a.category===query.category)&&(query.status==='all'||a.status===query.status)&&price&&date&&rem})}
    function stats(){let assets=state.assets,active=assets.filter(a=>!['sold','retired'].includes(a.status));return {count:assets.length,original:assets.reduce((s,a)=>s+num(a.purchasePrice),0),worth:assets.reduce((s,a)=>s+currentWorth(a),0),depr:assets.reduce((s,a)=>s+depreciation(a),0),repair:assets.reduce((s,a)=>s+maintenanceCost(a),0),sold:assets.filter(a=>a.status==='sold').reduce((s,a)=>s+num(a.salePrice)-num(a.purchasePrice)-maintenanceCost(a),0),idle:active.filter(a=>daysBetween(a.lastUsedDate||a.purchaseDate)>180).length,expiring:active.filter(a=>a.warrantyUntil&&daysBetween(today(),a.warrantyUntil)<=60&&new Date(a.warrantyUntil)>=new Date(today())).length}}
    function exportData(){return JSON.stringify({version:2,exportedAt:new Date().toISOString(),assets:state.assets,categories:state.categories,settings:state.settings},null,2)}
    function parseImport(text){if(!String(text||'').trim())throw Error('导入内容为空。');if(text.length>MAX_IMPORT_CHARS)throw Error('导入内容过大，请拆分后再导入。');let data=JSON.parse(text);if(Array.isArray(data))data={version:1,assets:data};if(!data||typeof data!=='object'||!Array.isArray(data.assets))throw Error('导入内容缺少 assets 数组。');if(data.assets.length>MAX_ASSETS)throw Error(`资产数量过多，最多支持 ${MAX_ASSETS} 条。`);if(Array.isArray(data.categories)&&data.categories.length>MAX_CATEGORIES)throw Error(`分类数量过多，最多支持 ${MAX_CATEGORIES} 个。`);if(![1,2].includes(num(data.version)))throw Error('只支持 version 1 或 version 2。');return normalizeState({version:2,assets:data.assets,categories:data.categories||state.categories,settings:{...state.settings,...(data.settings||{})}})}
    function exportCsv(){let rows=[['名称','分类','状态','购买价','购买日期','当前估值','估值日期','保修到期','最近使用','出售日期','出售价格','标签','备注']];state.assets.forEach(a=>rows.push([a.name,a.category,STATUS[a.status],a.purchasePrice,a.purchaseDate,a.currentValue,a.valuationDate,a.warrantyUntil,a.lastUsedDate,a.soldDate,a.salePrice,a.tags.join('|'),a.notes]));return rows.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n')}
    function parseCsv(text){if(!String(text||'').trim())throw Error('CSV 内容为空。');if(text.length>MAX_IMPORT_CHARS)throw Error('CSV 内容过大，请拆分后再导入。');let lines=text.trim().split(/\r?\n/).filter(Boolean);if(lines.length<2)throw Error('CSV 至少需要表头和一条数据。');if(lines.length-1>MAX_ASSETS)throw Error(`资产数量过多，最多支持 ${MAX_ASSETS} 条。`);let parse=line=>{let out=[],cur='',q=false;for(let i=0;i<line.length;i++){let ch=line[i];if(ch==='"'&&line[i+1]==='"'){cur+='"';i++}else if(ch==='"')q=!q;else if(ch===','&&!q){out.push(limitText(cur));cur=''}else cur+=ch}out.push(limitText(cur));return out};let headers=parse(lines[0]);let items=lines.slice(1).map(line=>{let r=parse(line),o={};headers.forEach((h,i)=>o[h]=r[i]||'');return normalizeAsset({name:o['名称'],category:o['分类'],status:Object.keys(STATUS).find(k=>STATUS[k]===o['状态'])||'active',purchasePrice:o['购买价'],purchaseDate:o['购买日期'],currentValue:o['当前估值'],valuationDate:o['估值日期'],warrantyUntil:o['保修到期'],lastUsedDate:o['最近使用'],soldDate:o['出售日期'],salePrice:o['出售价格'],tags:String(o['标签']||'').split('|'),notes:o['备注']})});return normalizeState({...state,assets:items})}
    function copyText(text){navigator.clipboard?.writeText(text).then(()=>show('已复制到剪贴板')).catch(()=>show('请手动复制文本框内容'))}

    function summaryStatsHtml(){let s=stats();return `<section class="grid stats"><div class="card stat"><span>资产数量</span><b>${s.count}</b></div><div class="card stat"><span>原价总额</span><b>${money(s.original)}</b></div><div class="card stat"><span>当前估值</span><b>${money(s.worth)}</b></div><div class="card stat"><span>折旧金额</span><b>${money(s.depr)}</b></div></section>`}
    function render(){document.documentElement.dataset.theme=state.settings.theme==='dark'?'dark':state.settings.theme==='plain'?'plain':'warm';document.getElementById('app').innerHTML=`<main class="app"><section class="hero"><h1>Money 个人资产管理</h1><p>记录资产、估值、保修、闲置、维修保养和完整生命周期，所有数据保存在本机。</p><div class="top-actions">${view==='settings'?'<button class="ghost" onclick="openDialog(\'exportJson\')">导出 JSON</button><button class="ghost" onclick="openDialog(\'importJson\')">导入 JSON</button>':''}</div></section>${view==='dashboard'?summaryStatsHtml():''}${viewHtml()}${tabs()}${dialogHtml()}${pickerHtml()}${toastHtml()}</main>`;bindFormImage();bindFocusScroll();bindKeyboardState()}
    function inputNeedsKeyboard(el){return el&&el.matches?.('input,textarea')&&!el.disabled&&!el.readOnly&&!["file","search","button","checkbox","radio"].includes(String(el.type||'').toLowerCase())}
    function updateViewportVars(){let vv=window.visualViewport,h=vv?.height||window.innerHeight;document.documentElement.style.setProperty('--vvh',`${Math.max(260,Math.round(h))}px`)}
    function updateKeyboardState(){updateViewportVars();let focused=inputNeedsKeyboard(document.activeElement),vv=window.visualViewport,open=!!focused&&vv&&vv.height<window.innerHeight-80;document.documentElement.classList.toggle('keyboard-open',!!open)}
    function bindKeyboardState(){if(window.__keyboardStateBound){updateKeyboardState();return}window.__keyboardStateBound=true;window.visualViewport?.addEventListener('resize',updateKeyboardState);window.visualViewport?.addEventListener('scroll',updateKeyboardState);document.addEventListener('focusin',updateKeyboardState);document.addEventListener('focusout',()=>setTimeout(updateKeyboardState,80));updateKeyboardState()}
    function bindFocusScroll(){if(window.__focusScrollBound)return;window.__focusScrollBound=true;document.addEventListener('focusin',e=>{let el=e.target;if(!inputNeedsKeyboard(el))return;clearTimeout(window.__focusScrollTimer);window.__focusScrollTimer=setTimeout(()=>requestAnimationFrame(()=>{let vv=window.visualViewport,rect=el.getBoundingClientRect(),height=vv?.height||window.innerHeight,bottomLimit=height-24;if(rect.top>=12&&rect.bottom<=bottomLimit)return;el.scrollIntoView({block:'nearest',behavior:'auto'})}),220)})}
    function tabs(){return `<nav class="tabs">${[['dashboard','仪表盘'],['assets','资产管理'],['settings','设置']].map(([k,v])=>`<button class="${view===k?'active':''}" onclick="setView('${k}')">${v}</button>`).join('')}</nav>`}
    function setView(v){document.activeElement?.blur();view=v;editingId=null;assetDraft=null;eventDraft=null;dialog=null;picker=null;render()}
    function viewHtml(){return view==='dashboard'?dashboardHtml():view==='assets'?assetsHtml():settingsHtml()}

    function dashboardHtml(){let s=stats(),top=[...state.assets].sort((a,b)=>realCost(b)-realCost(a)),idle=state.assets.filter(a=>!['sold','retired'].includes(a.status)&&daysBetween(a.lastUsedDate||a.purchaseDate)>180),exp=state.assets.filter(a=>a.warrantyUntil&&daysBetween(today(),a.warrantyUntil)<=60&&new Date(a.warrantyUntil)>=new Date(today()));let byCat=state.categories.map(c=>({name:c.name,total:state.assets.filter(a=>a.category===c.name).reduce((m,a)=>m+currentWorth(a),0)})).filter(x=>x.total>0);let max=Math.max(1,...byCat.map(x=>x.total));return `<section class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr))"><div class="card"><h2>整体资产情况</h2><p class="muted">维修保养成本 ${money(s.repair)}，出售盈亏 ${money(s.sold)}</p>${byCat.length?byCat.map(x=>`<p><span class="category-dot" style="background:${categoryColor(x.name)}"></span> ${esc(x.name)} ${money(x.total)}</p><div class="bar"><i style="width:${Math.round(x.total/max*100)}%"></i></div>`).join(''):'<div class="empty">还没有可统计的资产</div>'}</div><div class="card"><h2>提醒</h2><p>闲置超过 180 天：<b>${s.idle}</b> 件</p><p>60 天内保修/到期：<b>${s.expiring}</b> 件</p>${[...idle,...exp].slice(0,6).map(a=>`<p><button class="link" onclick="detail(${jsArg(a.id)})">${esc(a.name)}</button> <span class="muted">${a.warrantyUntil?'到期 '+esc(a.warrantyUntil):'闲置 '+daysBetween(a.lastUsedDate||a.purchaseDate)+' 天'}</span></p>`).join('')||'<div class="empty">暂无提醒</div>'}</div><div class="card"><h2>真实成本排行</h2><p class="muted">显示前 20 条</p><div class="rank-scroll">${top.slice(0,20).map(a=>`<p><button class="link" onclick="detail(${jsArg(a.id)})">${esc(a.name)}</button><br><span class="muted">${money(realCost(a))}，日均 ${money(realCost(a)/Math.max(1,daysBetween(a.purchaseDate,a.soldDate||today())))}</span></p>`).join('')||'<div class="empty">添加资产后显示排行</div>'}</div></div>${categoryDonutHtml()}</section>`}
    function assetListHtml(){let list=filteredAssets();return list.map(assetCard).join('')||'<div class="card empty">没有匹配的资产</div>'}
    function updateAssetList(){let box=document.getElementById('assetList');if(box)box.innerHTML=assetListHtml()}
    function onSearchInput(value){query.text=value;updateAssetList()}
    function assetsHtml(){return `<section><div class="section-title"><h2>资产管理</h2><button onclick="startAdd()">+ 新增资产</button></div>${assetDraft?formHtml():''}<div class="toolbar"><input id="assetSearch" type="search" placeholder="搜索名称、分类、标签、备注" value="${esc(query.text)}" oninput="onSearchInput(this.value)">${filterButton('category','分类',query.category,categoryOptions(true))}${filterButton('status','状态',query.status,statusOptions(true))}${filterButton('price','价格',query.price,[['all','全部价格'],['0-1000','1000 以下'],['1000-5000','1000-5000'],['5000+','5000 以上']])}${filterButton('date','时间',query.date,[['all','全部时间'],['year','一年内'],['old','一年以上']])}${filterButton('reminder','提醒',query.reminder,[['all','全部提醒'],['warranty','即将到期'],['idle','长期闲置']])}</div><div id="assetList" class="grid asset-list">${assetListHtml()}</div></section>`}
    function filterButton(field,label,value,options){let found=options.find(o=>o[0]===value)||options[0];return `<button class="picker-button" onclick="openChoice(${jsArg(label)},${jsArg(options)},${jsArg('query.'+field)})">${esc(found[1])}</button>`}
    function assetCard(a){let idle=daysBetween(a.lastUsedDate||a.purchaseDate)>180&&!['sold','retired'].includes(a.status);return `<article class="card asset"><div class="thumb">${a.image?`<img src="${esc(a.image)}" alt="" style="width:100%;height:100%;object-fit:cover">`:esc(a.name[0]||'资')}</div><div style="min-width:0;flex:1"><h3>${esc(a.name)}</h3><span class="pill"><span class="category-dot" style="background:${categoryColor(a.category)}"></span>${esc(a.category)}</span><span class="pill">${STATUS[a.status]}</span>${idle?'<span class="pill danger-text">长期闲置</span>':''}<p class="muted">原价 ${money(a.purchasePrice)} · 估值 ${money(a.currentValue)} · 真实成本 ${money(realCost(a))}</p><p>${a.tags.map(t=>`<span class="pill">#${esc(t)}</span>`).join('')}</p><div class="row"><button class="ghost" onclick="detail(${jsArg(a.id)})">详情</button><button class="ghost" onclick="editAsset(${jsArg(a.id)})">编辑</button></div></div></article>`}

    function field(label,html){return `<label><span class="field-label">${label}</span>${html}</label>`}
    function pickerField(label,text,onClick){return `<label><span class="field-label">${label}</span><button type="button" class="picker-button" onclick="${onClick}">${esc(text||'未填写')}</button></label>`}
    function formHtml(){let a=assetDraft;return `<section class="card"><div class="section-title"><h2>${editingId?'编辑资产':'添加资产'}</h2><button class="ghost" onclick="cancelEdit()">收起</button></div><form id="assetForm" onsubmit="submitAsset(event)"><div class="form-grid">${field('名称',`<input name="name" required value="${esc(a.name==='未命名资产'?'':a.name)}" oninput="assetDraft.name=this.value">`)}${pickerField('分类',a.category,`openChoice('选择分类',categoryOptions(false),'assetDraft.category')`)}${pickerField('状态',STATUS[a.status],`openChoice('选择状态',statusOptions(false),'assetDraft.status')`)}${field('购买价',`<input name="purchasePrice" type="number" step="0.01" value="${esc(a.purchasePrice||'')}" oninput="assetDraft.purchasePrice=this.value">`)}${pickerField('购买日期',a.purchaseDate,`openDate('购买日期','assetDraft.purchaseDate')`)}${field('当前估值',`<input name="currentValue" type="number" step="0.01" value="${esc(a.currentValue||'')}" oninput="assetDraft.currentValue=this.value">`)}${pickerField('估值日期',a.valuationDate||'未填写',`openDate('估值日期','assetDraft.valuationDate')`)}${pickerField('保修/到期',a.warrantyUntil||'未填写',`openDate('保修/到期','assetDraft.warrantyUntil')`)}${pickerField('最近使用',a.lastUsedDate||'未填写',`openDate('最近使用','assetDraft.lastUsedDate')`)}${pickerField('出售日期',a.soldDate||'未填写',`openDate('出售日期','assetDraft.soldDate')`)}${field('出售价格',`<input name="salePrice" type="number" step="0.01" value="${esc(a.salePrice||'')}" oninput="assetDraft.salePrice=this.value">`)}${field('标签',`<input name="tags" placeholder="常用, 保修中" value="${esc(a.tags.join(', '))}" oninput="assetDraft.tags=this.value">`)}${field('图片 URL / Base64',`<input name="image" value="${esc(a.image)}" placeholder="可粘贴图片地址或 Base64，单张不超过 ${MAX_IMAGE_LABEL}" oninput="assetDraft.image=this.value">`)}<label class="span2"><span class="field-label">从本机选择图片</span><input id="imageFile" type="file" accept="image/*"></label><label class="span2"><span class="field-label">备注</span><textarea name="notes" oninput="assetDraft.notes=this.value">${esc(a.notes)}</textarea></label></div><div class="row" style="margin-top:14px"><button type="submit">保存资产</button><button class="ghost" type="button" onclick="applySuggestedValue()">按折旧率估算现值</button>${editingId?`<button class="warn" type="button" onclick="askDeleteAsset(${jsArg(editingId)})">删除</button>`:''}</div></form></section>`}
    function scrollToForm(){setTimeout(()=>document.getElementById('assetForm')?.scrollIntoView({block:'start',behavior:'auto'}),80)}
    function startAdd(){editingId=null;dialog=null;picker=null;assetDraft=normalizeAsset({name:'',purchasePrice:'',currentValue:''});view='assets';render();scrollToForm()}function editAsset(id){editingId=id;dialog=null;picker=null;assetDraft=normalizeAsset(state.assets.find(a=>a.id===id));view='assets';render();scrollToForm()}function cancelEdit(){editingId=null;assetDraft=null;picker=null;render()}
    function submitAsset(e){e.preventDefault();let a,nextAssets;try{a=normalizeAsset({...assetDraft,id:editingId||uid()});nextAssets=editingId?state.assets.map(x=>x.id===editingId?a:x):[a,...state.assets];validateStateSize({...state,assets:nextAssets})}catch(err){show(err.message||'资产内容不符合要求');return}snapshot(editingId?'编辑资产前':'新增资产前');state.assets=nextAssets;editingId=null;assetDraft=null;view='assets';save('资产已保存');render()}
    function askDeleteAsset(id){openConfirm('删除资产','确定删除这条资产？删除前会自动创建备份。','删除',()=>{snapshot('删除资产前');state.assets=state.assets.filter(a=>a.id!==id);editingId=null;assetDraft=null;dialog=null;view='assets';save('资产已删除')})}
    function applySuggestedValue(){assetDraft.currentValue=suggestedValue(normalizeAsset(assetDraft));assetDraft.valuationDate=today();render()}

    function detail(id){let a=state.assets.find(x=>x.id===id);if(a){eventDraft={type:'维修',date:today(),amount:'',notes:''};dialog={type:'detail',assetId:id}}render()}
    function detailHtml(){let a=state.assets.find(x=>x.id===dialog.assetId);if(!a)return'';return `<div class="dialog"><div class="section-title"><h2>${esc(a.name)}</h2><button class="ghost" onclick="closeDialog()">关闭</button></div>${a.image?`<img src="${esc(a.image)}" alt="" style="width:100%;max-height:240px;object-fit:cover;border-radius:22px;margin-bottom:12px">`:''}<p><span class="pill">${STATUS[a.status]}</span><span class="pill">${esc(a.category)}</span>${a.tags.map(t=>`<span class="pill">#${esc(t)}</span>`).join('')}</p><div class="grid stats"><div class="stat"><span>原价</span><b>${money(a.purchasePrice)}</b></div><div class="stat"><span>估值</span><b>${money(a.currentValue)}</b></div><div class="stat"><span>维修保养</span><b>${money(maintenanceCost(a))}</b></div><div class="stat"><span>真实成本</span><b>${money(realCost(a))}</b></div></div><p class="muted">购买 ${esc(a.purchaseDate)} · 持有 ${daysBetween(a.purchaseDate,a.soldDate||today())} 天 · 保修/到期 ${esc(a.warrantyUntil||'未填写')}</p><p>${esc(a.notes)}</p><h3>生命周期</h3><div class="timeline"><div class="timeline-item"><b>购买</b> ${esc(a.purchaseDate)} ${money(a.purchasePrice)}</div>${a.events.map(e=>`<div class="timeline-item"><b>${esc(e.type)}</b> ${esc(e.date)} ${e.amount?money(e.amount):''}<br><span class="muted">${esc(e.notes)}</span> <button class="link" onclick="askRemoveEvent(${jsArg(a.id)},${jsArg(e.id)})">删除</button></div>`).join('')}</div><h3>新增事件</h3><form onsubmit="addEvent(event,${jsArg(a.id)})" class="form-grid">${pickerField('类型',eventDraft.type,`openChoice('选择事件类型',eventOptions(),'eventDraft.type')`)}${pickerField('日期',eventDraft.date,`openDate('事件日期','eventDraft.date')`)}${field('金额',`<input name="amount" type="number" step="0.01" value="${esc(eventDraft.amount)}" oninput="eventDraft.amount=this.value">`)}${field('备注',`<input name="notes" value="${esc(eventDraft.notes)}" oninput="eventDraft.notes=this.value">`)}<div class="span2 row"><button>添加事件</button><button class="ghost" type="button" onclick="editAsset(${jsArg(a.id)})">编辑资产</button></div></form></div>`}
    function addEvent(e,id){e.preventDefault();let a=state.assets.find(x=>x.id===id),type=eventDraft.type,date=eventDraft.date||today(),amount=num(eventDraft.amount),notes=eventDraft.notes;snapshot('新增生命周期事件前');a.events.push({id:uid(),type,date,amount,notes});if(type==='估值'){a.currentValue=amount;a.valuationDate=date}if(type==='使用'){a.lastUsedDate=date}if(type==='出售'){a.status='sold';a.soldDate=date;a.salePrice=amount;a.currentValue=0}if(type==='报废'){a.status='retired';a.currentValue=0}save('事件已添加');detail(id)}
    function askRemoveEvent(assetId,eventId){openConfirm('删除事件','确定删除这条生命周期事件？','删除',()=>{let a=state.assets.find(x=>x.id===assetId);snapshot('删除生命周期事件前');a.events=a.events.filter(e=>e.id!==eventId);save('事件已删除');detail(assetId)})}

    function settingsHtml(){return `<section><div class="section-title"><h2>设置</h2></div><div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(280px,1fr))"><div class="card"><h3>数据备份</h3><p class="muted">导入会覆盖当前资产，导入前会自动备份。</p><div class="row"><button class="ghost" onclick="openDialog('exportJson')">导出 JSON</button><button class="ghost" onclick="openDialog('importJson')">导入 JSON</button><button class="ghost" onclick="openDialog('exportCsv')">导出 CSV</button><button class="ghost" onclick="openDialog('importCsv')">导入 CSV</button><button onclick="manualBackup()">立即备份</button></div>${backupHtml()}</div><div class="card"><h3>分类管理</h3>${categoriesHtml()}</div><div class="card"><h3>偏好设置</h3><div class="setting-block">${pickerField('主题',themeLabel(state.settings.theme),`openChoice('选择主题',themeOptions(),'state.settings.theme','主题已更新')`)}</div><label><span class="field-label">年折旧率 %</span><input type="number" value="${esc(state.settings.depreciationRate)}" onchange="state.settings.depreciationRate=num(this.value);save('折旧率已更新')"></label></div><div class="card"><h3>危险操作</h3><p class="muted">清空前会自动创建本地备份。</p><button class="warn" onclick="askClearAll()">清空全部数据</button></div></div></section>`}
    function categoriesHtml(){return `<div class="row" style="margin-bottom:10px"><button onclick="askAddCategory()">添加分类</button></div><table class="table"><tbody>${state.categories.map((c,i)=>`<tr><td><button class="choice-item" style="padding:10px;justify-content:center" onclick="openColorPicker(${i})"><span class="category-dot" style="background:${esc(c.color)}"></span></button></td><td><input value="${esc(c.name)}" onchange="renameCategory(${i},this.value)"></td><td><button class="ghost" onclick="openColorPicker(${i})">颜色</button></td><td><button class="ghost" onclick="askRemoveCategory(${i})">删除</button></td></tr>`).join('')}</tbody></table>`}
    function askAddCategory(){openText('添加分类','分类名称','',name=>{if(!name.trim())return;state.categories.push({name:name.trim(),color:'#718096'});save('分类已添加')})}
    function renameCategory(i,name){let old=state.categories[i].name;state.categories[i].name=name;state.assets.forEach(a=>{if(a.category===old)a.category=name});save('分类已重命名')}
    function askRemoveCategory(i){let name=state.categories[i].name;if(state.categories.length<=1)return show('至少保留一个分类');openConfirm('删除分类',`删除“${name}”后，该分类资产会归入“其他”。`,'删除',()=>{state.categories.splice(i,1);if(!state.categories.find(c=>c.name==='其他'))state.categories.push({name:'其他',color:'#718096'});state.assets.forEach(a=>{if(a.category===name)a.category='其他'});save('分类已删除')})}
    function colorOptions(){return [['#4299e1','蓝色'],['#ed8936','橙色'],['#9f7aea','紫色'],['#48bb78','绿色'],['#ecc94b','黄色'],['#f56565','红色'],['#718096','灰色'],['#b7791f','棕色'],['#2d3748','深灰'],['#38b2ac','青色']]}
    function openColorPicker(i){let c=state.categories[i];picker={type:'color',title:`选择“${c.name}”颜色`,categoryIndex:i,options:colorOptions()};render()}
    function chooseColor(value){state.categories[picker.categoryIndex].color=value;picker=null;save('分类颜色已更新');render()}
    function backupHtml(){let list=getBackups();return list.length?`<div style="margin-top:14px"><table class="table"><thead><tr><th>时间</th><th>说明</th><th></th></tr></thead><tbody>${list.map(b=>`<tr><td>${esc(new Date(b.at).toLocaleString())}</td><td>${esc(b.label||'未填写')}</td><td><div class="row"><button class="ghost" onclick="askEditBackupLabel(${jsArg(b.id)})">编辑说明</button><button class="ghost" onclick="askRestoreBackup(${jsArg(b.id)})">恢复</button><button class="ghost" onclick="askDeleteBackup(${jsArg(b.id)})">删除</button></div></td></tr>`).join('')}</tbody></table></div>`:'<div class="empty">暂无备份</div>'}
    function manualBackup(){openText('创建备份','备份说明','手动备份',label=>{snapshot(label.trim()||'手动备份');show('已创建备份');render()})}function askEditBackupLabel(id){let b=getBackups().find(x=>x.id===id);if(!b)return;openText('编辑备份说明','备份说明',b.label||'',label=>{let list=getBackups();let item=list.find(x=>x.id===id);if(!item)return;item.label=label.trim()||'未填写';saveBackups(list);show('备份说明已更新');render()})}function askRestoreBackup(id){let b=getBackups().find(x=>x.id===id);if(!b)return;openConfirm('恢复备份','恢复备份会覆盖当前数据，恢复前会再创建一个备份。','恢复',()=>{snapshot('恢复备份前');state=normalizeState(JSON.parse(b.data));save('备份已恢复');render()})}
    function askDeleteBackup(id){openConfirm('删除备份','确定删除这条备份？删除后不能恢复。','删除',()=>{let list=getBackups().filter(b=>b.id!==id);saveBackups(list);show('备份已删除');render()})}
    function askClearAll(){openConfirm('清空全部数据','确定清空全部资产？请先确认已导出重要备份。','清空',()=>{snapshot('清空全部数据前');state.assets=[];editingId=null;assetDraft=null;dialog=null;view='dashboard';save('已清空资产');render()})}

    function categoryOptions(withAll){let arr=state.categories.map(c=>[c.name,c.name,c.color]);return withAll?[['all','全部分类'],...arr]:arr}
    function statusOptions(withAll){let arr=Object.entries(STATUS).map(([k,v])=>[k,v]);return withAll?[['all','全部状态'],...arr]:arr}
    function eventOptions(){return EVENT_TYPES.map(t=>[t,t])}
    function themeOptions(){return [['warm','暖色主题'],['dark','深色主题'],['plain','简洁主题']]}
    function themeLabel(v){return (themeOptions().find(x=>x[0]===v)||themeOptions()[0])[1]}
    function openChoice(title,options,path,saveMsg){picker={type:'choice',title,options,path,saveMsg};render()}
    function openDate(title,path){let value=getPath(path)||today(),parts=String(value||today()).split('-');picker={type:'date',title,path,year:parts[0]||today().slice(0,4),month:parts[1]||today().slice(5,7),day:parts[2]||today().slice(8,10)};render()}
    function openConfirm(title,message,confirmText,action){picker={type:'confirm',title,message,confirmText,action};render()}
    function openText(title,label,value,action){picker={type:'text',title,label,value,action};render()}
    function pathTarget(path){let parts=path.split('.'),root=parts.shift(),roots={state,query,assetDraft,eventDraft,picker},obj=roots[root]||window[root];return {obj,parts}}
    function getPath(path){let target=pathTarget(path);return target.parts.reduce((o,k)=>o&&o[k],target.obj)}
    function setPath(path,value){let target=pathTarget(path),obj=target.obj;if(!obj)return;for(let i=0;i<target.parts.length-1;i++)obj=obj[target.parts[i]];obj[target.parts.at(-1)]=value}
    function chooseValue(value){setPath(picker.path,value);let msg=picker.saveMsg;if(picker.path.startsWith('state.'))save(msg||'设置已更新');picker=null;render()}
    function chooseDate(){let y=String(document.getElementById('pickYear').value).padStart(4,'0'),m=String(document.getElementById('pickMonth').value).padStart(2,'0'),d=String(document.getElementById('pickDay').value).padStart(2,'0'),date=`${y}-${m}-${d}`,check=new Date(date);if(!/^\d{4}-\d{2}-\d{2}$/.test(date)||check.getFullYear()!=Number(y)||check.getMonth()+1!=Number(m)||check.getDate()!=Number(d)){show('请输入有效日期');return}setPath(picker.path,date);picker=null;render()}
    function clearDate(){setPath(picker.path,'');picker=null;render()}
    function confirmPicker(){let action=picker.action;picker=null;action();render()}
    function confirmText(){let value=document.getElementById('pickerText').value,action=picker.action;picker=null;action(value);render()}
    function pickerHtml(){if(!picker)return'';if(picker.type==='choice'){let current=getPath(picker.path);return `<div class="picker-backdrop"><div class="picker"><div class="section-title"><h2>${esc(picker.title)}</h2><button class="ghost" onclick="picker=null;render()">关闭</button></div><div class="choice-list">${picker.options.map(o=>`<button class="choice-item ${current===o[0]?'active':''}" onclick="chooseValue(${jsArg(o[0])})"><span>${o[2]?`<span class="category-dot" style="background:${esc(o[2])}"></span> `:''}${esc(o[1])}</span><span>${current===o[0]?'✓':''}</span></button>`).join('')}</div></div></div>`}if(picker.type==='color'){let current=state.categories[picker.categoryIndex].color;return `<div class="picker-backdrop"><div class="picker"><div class="section-title"><h2>${esc(picker.title)}</h2><button class="ghost" onclick="picker=null;render()">关闭</button></div><div class="choice-list">${picker.options.map(o=>`<button class="choice-item ${current===o[0]?'active':''}" onclick="chooseColor(${jsArg(o[0])})"><span><span class="category-dot" style="background:${esc(o[0])}"></span> ${esc(o[1])}</span><span>${current===o[0]?'✓':''}</span></button>`).join('')}</div></div></div>`}if(picker.type==='date'){return `<div class="picker-backdrop"><div class="picker"><div class="section-title"><h2>${esc(picker.title)}</h2><button class="ghost" onclick="picker=null;render()">关闭</button></div><div class="date-grid"><label><span class="field-label">年</span><input id="pickYear" inputmode="numeric" value="${esc(picker.year)}"></label><label><span class="field-label">月</span><input id="pickMonth" inputmode="numeric" value="${esc(picker.month)}"></label><label><span class="field-label">日</span><input id="pickDay" inputmode="numeric" value="${esc(picker.day)}"></label></div><div class="row" style="margin-top:14px"><button onclick="chooseDate()">确定</button><button class="ghost" onclick="picker.year=today().slice(0,4);picker.month=today().slice(5,7);picker.day=today().slice(8,10);render()">今天</button><button class="ghost" onclick="clearDate()">清空</button></div></div></div>`}if(picker.type==='confirm'){return `<div class="picker-backdrop"><div class="picker"><h2>${esc(picker.title)}</h2><p class="muted">${esc(picker.message)}</p><div class="row"><button class="warn" onclick="confirmPicker()">${esc(picker.confirmText)}</button><button class="ghost" onclick="picker=null;render()">取消</button></div></div></div>`}return `<div class="picker-backdrop"><div class="picker"><h2>${esc(picker.title)}</h2><label><span class="field-label">${esc(picker.label)}</span><input id="pickerText" value="${esc(picker.value)}"></label><div class="row" style="margin-top:14px"><button onclick="confirmText()">确定</button><button class="ghost" onclick="picker=null;render()">取消</button></div></div></div>`}

    function openDialog(type){dialog={type,text:type==='exportJson'?exportData():type==='exportCsv'?exportCsv():'',preview:null,error:''};render()}function closeDialog(){dialog=null;render()}
    function getDialogText(){return document.getElementById('dialogText')?.value||''}
    function importFeedbackHtml(){return `${dialog?.error?`<p class="danger-text">${esc(dialog.error)}</p>`:''}${dialog?.preview?`<div class="card"><b>预览：${dialog.preview.assets.length} 条资产，${dialog.preview.categories.length} 个分类</b><p class="muted">导入会替换当前 ${state.assets.length} 条资产，导入前自动备份。</p></div>`:''}<div class="row"><button onclick="previewImport('${dialog?.type||'importJson'}')">预览导入</button>${dialog?.preview?`<button class="ok" onclick="confirmImport()">确认导入</button>`:''}</div>`}
    function updateImportDialogFeedback(){let box=document.getElementById('importFeedback');if(box)box.innerHTML=importFeedbackHtml()}
    function dialogHtml(){if(!dialog)return'';if(dialog.type==='detail')return `<div class="dialog-backdrop">${detailHtml()}</div>`;let title={exportJson:'导出 JSON',importJson:'导入 JSON',exportCsv:'导出 CSV',importCsv:'导入 CSV'}[dialog.type],isExport=dialog.type.startsWith('export');return `<div class="dialog-backdrop"><div class="dialog"><div class="section-title"><h2>${title}</h2><button class="ghost" onclick="closeDialog()">关闭</button></div>${isExport?`<p class="muted">复制下面内容保存到安全位置。</p><textarea readonly id="dialogText">${esc(dialog.text)}</textarea><div class="row"><button onclick="copyText(document.getElementById('dialogText').value)">一键复制</button></div>`:`<p class="muted">粘贴${dialog.type==='importCsv'?'CSV':'JSON'}内容，先预览再导入。</p><textarea id="dialogText" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea><div id="importFeedback">${importFeedbackHtml()}</div>`}</div></div>`}
    function previewImport(type){let text=getDialogText();try{dialog.preview=type==='importCsv'?parseCsv(text):parseImport(text);dialog.error=''}catch(e){dialog.error=e.message||'导入失败';dialog.preview=null}updateImportDialogFeedback()}
    function confirmImport(){if(!dialog.preview)return;snapshot('导入数据前');state=dialog.preview;editingId=null;assetDraft=null;dialog=null;view='assets';save('已导入数据');render()}
    function bindFormImage(){let input=document.getElementById('imageFile');if(!input)return;input.onchange=e=>{let file=e.target.files[0];if(!file)return;if(file.size>MAX_IMAGE_BYTES){show(`图片过大，请选择小于 ${MAX_IMAGE_LABEL} 的图片或粘贴压缩后的图片地址。`);input.value='';return}let reader=new FileReader();reader.onload=()=>{try{assetDraft.image=cleanImage(reader.result);render()}catch(err){show(err.message||'图片不符合要求');input.value=''}};reader.readAsDataURL(file)}}
    Object.assign(window,{startAdd,setView,detail,editAsset,cancelEdit,submitAsset,askDeleteAsset,applySuggestedValue,addEvent,askRemoveEvent,askAddCategory,renameCategory,askRemoveCategory,openColorPicker,chooseColor,manualBackup,askEditBackupLabel,askRestoreBackup,askDeleteBackup,askClearAll,openDialog,closeDialog,previewImport,confirmImport,copyText,num,openChoice,openDate,chooseValue,chooseDate,clearDate,confirmPicker,confirmText,onSearchInput});
    render();
  </script>
